<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>💣 炫彩數字炸彈</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  height:100vh;
  overflow:hidden;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:"Segoe UI",sans-serif;
  background:linear-gradient(-45deg,#0f2027,#203a43,#2c5364,#ff416c);
  background-size:400% 400%;
  animation:bgMove 12s ease infinite;
  color:white;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.container{
  width:380px;
  padding:35px;
  border-radius:30px;
  text-align:center;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(14px);
  box-shadow:0 10px 40px rgba(0,0,0,0.4);
  position:relative;
  overflow:hidden;
}

.container::before{
  content:"";
  position:absolute;
  width:300px;
  height:300px;
  background:rgba(255,255,255,0.1);
  border-radius:50%;
  top:-120px;
  left:-120px;
}

.container::after{
  content:"";
  position:absolute;
  width:250px;
  height:250px;
  background:rgba(255,255,255,0.05);
  border-radius:50%;
  bottom:-100px;
  right:-100px;
}

.bomb{
  font-size:72px;
  animation:bounce 1.5s infinite;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.6));
}

@keyframes bounce{
  0%,100%{
    transform:translateY(0) rotate(0deg);
  }
  50%{
    transform:translateY(-12px) rotate(8deg);
  }
}

h1{
  margin-top:10px;
  margin-bottom:10px;
  font-size:2.3rem;
}

.subtitle{
  color:#ddd;
  margin-bottom:25px;
}

.range{
  font-size:1.3rem;
  padding:15px;
  border-radius:18px;
  background:rgba(255,255,255,0.12);
  margin-bottom:20px;
}

input{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  text-align:center;
  font-size:1.1rem;
  margin-bottom:15px;
  outline:none;
}

button{
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  font-size:1.1rem;
  font-weight:bold;
  cursor:pointer;
  color:white;
  background:linear-gradient(135deg,#ff416c,#ff4b2b);
  transition:0.25s;
}

button:hover{
  transform:scale(1.05);
  box-shadow:0 0 25px rgba(255,75,43,0.6);
}

.message{
  margin-top:20px;
  min-height:30px;
  font-size:1.2rem;
  font-weight:bold;
}

.history{
  margin-top:15px;
  color:#ddd;
  font-size:0.95rem;
}

.reset-btn{
  margin-top:18px;
  background:linear-gradient(135deg,#36d1dc,#5b86e5);
}

.shake{
  animation:shake 0.4s;
}

@keyframes shake{
  0%{transform:translateX(0);}
  20%{transform:translateX(-10px);}
  40%{transform:translateX(10px);}
  60%{transform:translateX(-10px);}
  80%{transform:translateX(10px);}
  100%{transform:translateX(0);}
}

.explode{
  animation:explode 0.8s infinite alternate;
}

@keyframes explode{
  from{
    transform:scale(1);
    filter:brightness(1);
  }
  to{
    transform:scale(1.08);
    filter:brightness(1.5);
  }
}

/* 彩色粒子 */

.particle{
  position:absolute;
  width:10px;
  height:10px;
  border-radius:50%;
  pointer-events:none;
  animation:fly 1s linear forwards;
}

@keyframes fly{
  to{
    transform:translate(var(--x),var(--y)) scale(0);
    opacity:0;
  }
}

</style>
</head>

<body>

<div class="container" id="gameBox">

  <div class="bomb" id="bomb">💣</div>

  <h1>數字炸彈</h1>
  <div class="subtitle">
    猜中神秘數字就會爆炸！
  </div>

  <div class="range" id="range">
    範圍：1 ~ 100
  </div>

  <input
    type="number"
    id="guessInput"
    placeholder="輸入你的猜測"
  >

  <button onclick="checkGuess()">
    🎯 猜數字
  </button>

  <div class="message" id="message"></div>

  <div class="history" id="history">
    猜測紀錄：
  </div>

  <button
    class="reset-btn"
    onclick="resetGame()"
  >
    🔄 重新開始
  </button>

</div>

<script>

let answer;
let min;
let max;
let historyList;

function startGame(){

  answer = Math.floor(Math.random()*100)+1;

  min = 1;
  max = 100;

  historyList = [];

  updateUI();

  document.getElementById("message").innerText = "";

  document
    .getElementById("gameBox")
    .classList.remove("explode");
}

function updateUI(){

  document.getElementById("range").innerText =
    `範圍：${min} ~ ${max}`;

  document.getElementById("history").innerText =
    "猜測紀錄：" + historyList.join(", ");
}

function shakeBox(){

  const box = document.getElementById("gameBox");

  box.classList.add("shake");

  setTimeout(()=>{
    box.classList.remove("shake");
  },400);
}

function createParticles(){

  for(let i=0;i<40;i++){

    const particle = document.createElement("div");

    particle.className = "particle";

    particle.style.left = "50%";
    particle.style.top = "50%";

    particle.style.background =
      `hsl(${Math.random()*360},100%,60%)`;

    particle.style.setProperty(
      "--x",
      `${(Math.random()-0.5)*600}px`
    );

    particle.style.setProperty(
      "--y",
      `${(Math.random()-0.5)*600}px`
    );

    document.body.appendChild(particle);

    setTimeout(()=>{
      particle.remove();
    },1000);
  }
}

function checkGuess(){

  const input =
    document.getElementById("guessInput");

  const guess = Number(input.value);

  const msg =
    document.getElementById("message");

  if(!guess){

    msg.innerText = "⚠️ 請輸入數字";
    shakeBox();
    return;
  }

  if(guess <= min || guess >= max){

    msg.innerText =
      `⚠️ 請輸入 ${min} ~ ${max}`;

    shakeBox();
    return;
  }

  historyList.push(guess);

  if(guess === answer){

    msg.innerText =
      "💥 BOOOOOOM！炸彈爆炸！";

    msg.style.color = "#ffe066";

    document
      .getElementById("gameBox")
      .classList.add("explode");

    createParticles();
  }

  else if(guess < answer){

    min = guess;

    msg.innerText =
      "📉 太小了！";

    msg.style.color = "#8aff80";

    shakeBox();
  }

  else{

    max = guess;

    msg.innerText =
      "📈 太大了！";

    msg.style.color = "#ff9f9f";

    shakeBox();
  }

  updateUI();

  input.value = "";
}

function resetGame(){
  startGame();
}

startGame();

</script>

</body>
</html>
